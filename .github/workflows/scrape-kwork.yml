name: Scrape Kwork

on:
  workflow_dispatch:
    inputs:
      pages:
        description: "How many first Kwork pages to scan"
        required: false
        default: "3"
  push:
    paths:
      - "trigger.txt"

permissions:
  contents: write

concurrency:
  group: kwork-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Scrape Kwork
        shell: bash
        run: |
          PAGES="${{ inputs.pages }}"
          if [ -z "$PAGES" ]; then PAGES="3"; fi
          echo "Scanning first $PAGES page(s)"
          KWORK_PAGES="$PAGES" python scraper.py

      - name: Commit scraper output
        shell: bash
        run: |
          git config user.name "kworkworks-bot"
          git config user.email "kworkworks-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "Update Kwork project data"
          git push
