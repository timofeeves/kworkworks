name: Scrape Kwork

on:
  workflow_dispatch:
    inputs:
      pages:
        description: "How many first Kwork pages to scan"
        required: false
        default: "3"
  push:
    paths:
      - "trigger.txt"
  schedule:
    # Fast scan: first page every 10 minutes.
    - cron: "3,13,23,33,43,53 * * * *"
    # Deep scan: first five pages once per hour.
    - cron: "7 * * * *"

permissions:
  contents: write

concurrency:
  group: kwork-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Scrape Kwork
        shell: bash
        run: |
          PAGES="${{ inputs.pages }}"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "7 * * * *" ]; then
              PAGES="5"
            else
              PAGES="1"
            fi
          elif [ -z "$PAGES" ] && [ -f trigger.txt ]; then
            PAGES="$(head -n 1 trigger.txt | tr -cd '0-9')"
          fi

          if ! [[ "$PAGES" =~ ^[1-9][0-9]?$ ]]; then PAGES="3"; fi
          if [ "$PAGES" -gt 50 ]; then PAGES="50"; fi

          echo "Scanning first $PAGES page(s)"
          KWORK_PAGES="$PAGES" python scraper.py

      - name: Commit scraper output
        shell: bash
        run: |
          git config user.name "kworkworks-bot"
          git config user.email "kworkworks-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "Update Kwork project data"
          git push